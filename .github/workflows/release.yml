name: Publish Release Asset

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install --yes ant

      - name: Build framework package
        run: ./scripts/build-package.sh

      - name: Publish GitHub Release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          project_version=$(awk -F'[<>]' '$2 == "version" { print $3; exit }' framework.xml)
          schema_version=$(awk -F'[<>]' '$2 ~ /^schema([[:space:]]|$)/ { in_schema = 1 } in_schema && $2 == "version" { print $3; exit }' framework.xml)
          expected_tag="v${project_version}"
          asset_path="build/${schema_version}/oxygen-tei-lex-0-${project_version}.zip"

          if [ "${TAG_NAME}" != "${expected_tag}" ]; then
            echo "Tag ${TAG_NAME} does not match framework version ${project_version}."
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${asset_path}" --clobber
          else
            gh release create "${TAG_NAME}" "${asset_path}" --title "${TAG_NAME}" --notes "Release ${project_version}"
          fi
