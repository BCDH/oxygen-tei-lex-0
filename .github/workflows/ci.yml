name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install --yes ant

      - name: Build framework package
        run: ./scripts/build-package.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: framework-package
          path: |
            build/**/*.zip
